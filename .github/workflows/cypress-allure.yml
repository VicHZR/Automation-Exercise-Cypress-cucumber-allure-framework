name: E2E - Cypress + Allure

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress tests (Chrome headless)
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          # si tu proyecto no requiere 'build' dejar vacío
          build: npm ci
          start: '' 
          wait-on: ''

      - name: Generate Allure Report
        run: npx allure generate --clean allure-results -o allure-report
        if: always()

      - name: Upload Allure Results (raw)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results

      - name: Upload Allure Report (static site)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report

      # Publicar en GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact (Allure)
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4